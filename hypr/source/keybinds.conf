###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier



#pypr

bind = alt, 1, togglespecialworkspace, term
bind = alt, 2, togglespecialworkspace, audio
bind = alt, 3, togglespecialworkspace, taskbar
bind = alt, 4, togglespecialworkspace, spotify


bind= $mainMod, P,exec,swayosd-client --playerctl play-pause


# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

bind = alt, space, exec,pkill rofi || $menu

bind = $mainMod, Q, exec, $terminal

bind = $mainMod, w, exec, $browser
bind = $mainMod shift, w,exec, $browser2 

bind = $mainMod, E, exec, $fileManager
bind = $mainMod shift, E, exec, $fileManager2

bind = $mainMod, R,exec, gnome-text-editor

bind = $mainMod, X, killactive,
bind = $mainMod shift, X,exec, hyprctl kill

bind = $mainMod, M,exec,hyprlock
bind = $mainMod shift, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = alt,tab,exec,wlogout -b 2

bind = $mainMod, A,fullscreen
bind = $mainMod, D, togglefloating,

bind = $mainMod, y, layoutmsg, togglesplit # dwindle

bind = $mainMod, N,exec, swaync-client -t
bind = $mainMod, S, exec, sh -c 'pkill -x slurp || grim -g "$(slurp)" - | swappy -f -'


# Scripts
bind = alt, P,exec,~/user_scripts/toggle_edp.sh
bind = alt shift, r,exec,~/user_scripts/refresh.sh
bind = alt, r,exec, hyprctl reload
#bind = alt, s,exec, pkill -x slurp || 
bind = alt, I,exec, pkill -x slurp || ~/user_scripts/google_image_search/google_image_search.sh
bind = alt, U,exec, ~/user_scripts/wayclick/robust_but_slow_startup/dusky_wayclick.sh
bind = alt, G,exec, ~/dotfiles/hypr/scripts/toggle_mode.sh
bind = alt, W,exec, pkill rofi || ~/dotfiles/hypr/wallpaper.sh
bind = alt, C,exec, pkill rofi || ~/user_scripts/config_edit.sh
bind = alt, B,exec, pkill rofi || ~/dotfiles/waybar/scripts/select.sh
# - OCR (Tesseract)
bind = alt, T, exec,pkill slurp || pgrep tesseract || (slurp | grim -g - - | tesseract stdin stdout -l eng | wl-copy) 

binde = $mainMod, apostrophe,resizeactive, 3% 0%
binde = $mainMod, semicolon,resizeactive, -3% 0%

binde = $mainMod shift, apostrophe,resizeactive, 0% 3%
binde = $mainMod shift, semicolon,resizeactive, 0% -3%


# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, u
bind = $mainMod, k, movefocus, d

bind = $mainMod shift, h, movewindow, l
bind = $mainMod shift, l, movewindow, r
bind = $mainMod shift, j, movewindow, u
bind = $mainMod shift, k, movewindow, d


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, z, togglespecialworkspace, magic
bind = $mainMod SHIFT, z, movetoworkspace, special:magic


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,F8, exec, swayosd-client --output-volume +2
bindel = ,F7, exec, swayosd-client --output-volume -2
bindel = ,F6, exec, swayosd-client --output-volume mute-toggle
bindel = ,F3, exec, swayosd-client --brightness +2
bindel = ,F2, exec, swayosd-client --brightness -2
bindl = ALT, F3, exec, ~/user_scripts/swayosd-ddcutil.sh up
bindl = ALT, F2, exec, ~/user_scripts/swayosd-ddcutil.sh down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

