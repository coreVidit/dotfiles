$mainMod = SUPER

# ==============================================================================
# APPLICATIONS
# ==============================================================================
bindd = $mainMod, Q,             Open Terminal,               exec, $terminal
bindd = $mainMod, W,             Open Browser,                exec, $browser
bindd = $mainMod SHIFT, W,       Open Secondary Browser,      exec, $browser2 
bindd = $mainMod, E,             Open File Manager,           exec, $fileManager
bindd = $mainMod SHIFT, E,       Open Secondary File Manager, exec, $fileManager2
bindd = $mainMod, R,             Open Text Editor,            exec, gnome-text-editor
bindd = ALT, SPACE,              Open App Launcher,           exec, $menu

# ==============================================================================
# SYSTEM & UTILITIES
# ==============================================================================
bindd = $mainMod, M,             Lock Screen,                 exec, hyprlock
bindd = $mainMod SHIFT, M,       Exit Hyprland,               exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = ALT, TAB,                Open Logout Menu,            exec, pkill wlogout || wlogout -b 2
bindd = ALT SHIFT, R,            Restart Waybar,              exec, ~/user_scripts/refresh.sh
bindd = ALT, R,                  Reload Hyprland,             exec, hyprctl reload
bindd = CTRL SHIFT, SPACE,       Show Keybinds,               exec, $scripts/hyprland/keybind_helper.sh

# ==============================================================================
# CUSTOM SCRIPTS
# ==============================================================================
bindd = ALT, I,                  Google Image Search,         exec, pkill -x slurp || ~/user_scripts/google_image_search/google_image_search.sh
bindd = ALT, U,                  Wayclick Startup,            exec, ~/user_scripts/wayclick/robust_but_slow_startup/dusky_wayclick.sh
bindd = ALT, G,                  Toggle Theme Mode,           exec, $scripts/hyprland/toggle_mode.sh
bindd = ALT, W,                  Change Wallpaper,            exec, $scripts/hyprland/wallpaper.sh
bindd = ALT, B,                  Select Waybar Theme,         exec, $scripts/waybar/select.sh
bindd = ALT, P,                  Toggle EDP Display,          exec, ~/user_scripts/toggle_edp.sh
bindd = ALT, T,                  Extract Text (OCR),          exec, pkill slurp || pgrep tesseract || (slurp | grim -g - - | tesseract stdin stdout -l eng | wl-copy) 

# ==============================================================================
# SCREENSHOTS
# ==============================================================================
bindd = , F12,                   Screenshot Output,           exec, hyprshot, -m output --raw | satty --filename -
bindd = $mainMod, S,             Screenshot Region,           exec, hyprshot -m region --raw | satty --filename -

# ==============================================================================
# WINDOW MANAGEMENT
# ==============================================================================
bindd = $mainMod, X,             Close Active Window,         killactive,
bindd = $mainMod SHIFT, X,       Force Kill Window,           exec, hyprctl kill
bindd = $mainMod, A,             Toggle Fullscreen,           fullscreen,
bindd = $mainMod, D,             Toggle Floating,             togglefloating,
bindd = $mainMod, Y,             Toggle Split (Dwindle),      layoutmsg, togglesplit
bindd = $mainMod, GRAVE,         Toggle Active Opaque,        setprop, active opaque toggle
bindd = $mainMod, N,             Toggle Notification Center,  exec, swaync-client -t

# Focus
bindd = $mainMod, H,             Move Focus Left,             movefocus, l
bindd = $mainMod, L,             Move Focus Right,            movefocus, r
bindd = $mainMod, J,             Move Focus Up,               movefocus, u
bindd = $mainMod, K,             Move Focus Down,             movefocus, d

# Move Window
bindd = $mainMod SHIFT, H,       Move Window Left,            movewindow, l
bindd = $mainMod SHIFT, L,       Move Window Right,           movewindow, r
bindd = $mainMod SHIFT, J,       Move Window Up,              movewindow, u
bindd = $mainMod SHIFT, K,       Move Window Down,            movewindow, d

# Resize Window (Keyboard)
binded = $mainMod, APOSTROPHE,       Resize Active Right,     resizeactive, 3% 0%
binded = $mainMod, SEMICOLON,        Resize Active Left,      resizeactive, -3% 0%
binded = $mainMod SHIFT, APOSTROPHE, Resize Active Down,      resizeactive, 0% 3%
binded = $mainMod SHIFT, SEMICOLON,  Resize Active Up,        resizeactive, 0% -3%

# Mouse Integration
bindmd = $mainMod, mouse:272,    Move Window (Mouse),         movewindow
bindmd = $mainMod, mouse:273,    Resize Window (Mouse),       resizewindow

# ==============================================================================
# WORKSPACES
# ==============================================================================
bindd = $mainMod, 1,             Go to Workspace 1,           workspace, 1
bindd = $mainMod, 2,             Go to Workspace 2,           workspace, 2
bindd = $mainMod, 3,             Go to Workspace 3,           workspace, 3
bindd = $mainMod, 4,             Go to Workspace 4,           workspace, 4
bindd = $mainMod, 5,             Go to Workspace 5,           workspace, 5
bindd = $mainMod, 6,             Go to Workspace 6,           workspace, 6
bindd = $mainMod, 7,             Go to Workspace 7,           workspace, 7
bindd = $mainMod, 8,             Go to Workspace 8,           workspace, 8
bindd = $mainMod, 9,             Go to Workspace 9,           workspace, 9
bindd = $mainMod, 0,             Go to Workspace 10,          workspace, 10

bindd = $mainMod SHIFT, 1,       Move to Workspace 1,         movetoworkspace, 1
bindd = $mainMod SHIFT, 2,       Move to Workspace 2,         movetoworkspace, 2
bindd = $mainMod SHIFT, 3,       Move to Workspace 3,         movetoworkspace, 3
bindd = $mainMod SHIFT, 4,       Move to Workspace 4,         movetoworkspace, 4
bindd = $mainMod SHIFT, 5,       Move to Workspace 5,         movetoworkspace, 5
bindd = $mainMod SHIFT, 6,       Move to Workspace 6,         movetoworkspace, 6
bindd = $mainMod SHIFT, 7,       Move to Workspace 7,         movetoworkspace, 7
bindd = $mainMod SHIFT, 8,       Move to Workspace 8,         movetoworkspace, 8
bindd = $mainMod SHIFT, 9,       Move to Workspace 9,         movetoworkspace, 9
bindd = $mainMod SHIFT, 0,       Move to Workspace 10,        movetoworkspace, 10

# Special Workspaces
bindd = $mainMod, Z,             Toggle Magic Workspace,      togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z,       Move to Magic Workspace,     movetoworkspace, special:magic
bindd = ALT, 1,                  Toggle Special (Term),       togglespecialworkspace, term
bindd = ALT, 2,                  Toggle Special (Audio),      togglespecialworkspace, audio
bindd = ALT, 3,                  Toggle Special (Taskbar),    togglespecialworkspace, taskbar
bindd = ALT, S,                  Toggle Special (Spotify),    togglespecialworkspace, spotify

# ==============================================================================
# HARDWARE & MEDIA
# ==============================================================================
bindld = $mainMod, P,            Play/Pause Media,            exec, swayosd-client --playerctl play-pause
bindld = , XF86AudioNext,        Next Track,                  exec, playerctl next
bindld = , XF86AudioPause,       Play/Pause Media,            exec, playerctl play-pause
bindld = , XF86AudioPlay,        Play/Pause Media,            exec, playerctl play-pause
bindld = , XF86AudioPrev,        Previous Track,              exec, playerctl previous

bindeld = , F8,                  Volume Up,                   exec, swayosd-client --output-volume +2
bindeld = , F7,                  Volume Down,                 exec, swayosd-client --output-volume -2
bindeld = , F6,                  Toggle Mute,                 exec, swayosd-client --output-volume mute-toggle

bindeld = , F3,                  Brightness Up,               exec, swayosd-client --brightness +2
bindeld = , F2,                  Brightness Down,             exec, swayosd-client --brightness -2
bindld = ALT, F3,                Ext Brightness Up (DDC),     exec, ~/system_scripts/swayosd/swayosd-ddcutil.sh up
bindld = ALT, F2,                Ext Brightness Down (DDC),   exec, ~/system_scripts/swayosd/swayosd-ddcutil.sh down

# Zoom
binded = $mainMod, EQUAL,        Zoom In,                     exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binded = $mainMod, MINUS,        Zoom Out,                    exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
