source = ~/.cache/wal/colors-hyprland.conf

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color4 $color2 45deg
    col.inactive_border = $color0
    border_size = 0
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.75
    inactive_opacity = 0.65


    # ... other settings like rounding/blur ...

    dim_inactive = true
    dim_strength = 0.2  # Adjust between 0.0 and 1.0 (0.1 to 0.3 is usually the sweet spot)
    dim_around = 0.4    # Optional: dims everything around a floating window/pinned window


    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 3
        contrast = 1
        xray = true

        vibrancy = 0.5
    }
}

