####################
### WINDOWSRULES ###
####################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# waybar blur
layerrule = blur on, ignore_alpha 0.5,match:namespace waybar

layerrule = blur on, ignore_alpha 0.1,match:namespace rofi
layerrule = xray on,match:namespace rofi
# Wlogout blur (blurs desktop content behind it, not a wallpaper)
layerrule = blur on, ignore_alpha 0.1,match:namespace wlogout

layerrule = blur on,ignore_alpha 0.5,match:namespace swaync-control-center
layerrule = blur on,ignore_alpha 0.5,match:namespace swaync-notification-window

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd

layerrule = blur on, ignore_alpha 0, match:namespace vicinae

windowrule = match:initial_class ^(spotify)$, float on

