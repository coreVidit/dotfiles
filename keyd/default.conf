[ids]
*

[main]
# Compose/Menu → fn_layer modifier (media/brightness keys)
compose = layer(fn_layer)
# CapsLock: tap = Escape, hold = nav_layer (vim hjkl arrows)
capslock = overload(nav_layer, esc)

[fn_layer]
# Map your F-keys to their 'Action' counterparts
f1  = coffee
f2  = brightnessdown
f3  = brightnessup
f4  = launch1
f5  = micmute
f6  = mute
f7  = volumedown
f8  = volumeup
f9  = previoussong
f10 = playpause
f11 = nextsong
f12 = sysrq

[nav_layer]
# Vim-style arrow keys while holding CapsLock
h = left
j = down
k = up
l = right
